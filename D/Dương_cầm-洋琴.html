<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <link rel="stylesheet" href="../nom4vi-common.css"/>
    <title>洋琴(Dương cầm)</title>
  </head>
  <body>
    <header><h1><ruby>洋琴<rt>Dương cầm</rt></ruby></h1></header>
    <main>
      <figure class="nom4vi-auto-float-right">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Grand_piano_and_upright_piano.jpg/250px-Grand_piano_and_upright_piano.jpg"/>
        <figcaption>Piano 󰰍（󱓥債）和 piano 匬（󱓥沛）</figcaption>
      </figure>
      <p><b>Piano</b> 𲺲<b>洋琴</b>𪜀𱍗楽具𣎏盤𫸿絏𥪝󲅵各絏𲟰󲆞𤳷各𱡬楛𲟰包撫𤳷𱍗物料𣟮󲆲（各𱡬楛現代𲟰撫𤳷縺𠫆，𱍗数弹 piano 時期頭𣳔𣯡）。</p>
      <h3>𠸜哙和辞源</h3>
      <p>𣈗𠓀，越南𣳔詞“西洋”（意義“㴜𪰂西”）掋指各𫭔西欧。欺 Piano 遊入󰾽方西𠓨越南𢧚班頭𲟰哙𪜀“西洋琴”，𢖖𫽹󰔴成“洋琴”。</p>
    </main>
  </body>
