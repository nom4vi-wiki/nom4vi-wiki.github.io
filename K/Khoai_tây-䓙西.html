<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css"/>
    <link rel="stylesheet" href="../nom4vi-common.css"/>
    <title>䓙西(Khoai tây)</title>
  </head>
  <body>
    <header><h1><ruby>䓙西<rt>Khoai tây</rt></ruby></h1></header>
    <main>
      <figure class="nom4vi-auto-float-right">
        <img width="280" height="187" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Potato_and_cross_section.jpg/330px-Potato_and_cross_section.jpg"/>
      </figure>
      <p><b>䓙西</b>，属𢩜𣖚。䓙西𪜀𩑛𣘃農業𥐉𣈗，堹𥙩𬄃𳂩精勃。</p>
      <h3>辞源</h3>
      <p>詞“䓙西”意指䓙󰾽方西，䓙西𱗬越南𲟰𫼳𦤾󰾽<a href="../P/Pháp_法.html">法</a>𠓨󲇌𫷜 1890。</p>
      <div class="nom4vi-with-float">
        <h3>特点</h3>
        <div class="nom4vi-auto-float-right">
          <figure>
            <img width="200" height="135" src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Potato_flowers.jpg/250px-Potato_flowers.jpg"/>
            <figcaption>花𧵑𣘃䓙西</figcaption>
          </figure>
          <figure>
            <img width="200" height="150" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Solanum_tuberosum_004.JPG/250px-Solanum_tuberosum_004.JPG"/>
            <figcaption>果䓙西</figcaption>
          </figure>
        </div>
        <p>花䓙西𣎏𬜝󱳗、紅、𧹻、󰘘、或𬜝𧹿。𢖖欺䓙西𫥨花，𱍗数𧀑咮𫥨果𬜝󰘘󲇕𣘃𠏳𬜝󰘘𲧞𣘃茄𳅡櫻桃，𣎏体𳂩 300 籺。果䓙西𣎏𳂩𱍗量𡘯各質毒 alkaloid、solanine 𢧚空𣳔掋𫗒𲟰。</p>
      </div>
      <h3>毒性</h3>
      <figure class="nom4vi-auto-float-left">
        <img width="200" height="151" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Potato_EarlyRose_sprouts.jpg/250px-Potato_EarlyRose_sprouts.jpg"/>
        <figcaption>𦾣𧀒𧵑𬄃䓙西</figcaption>
      </figure>
      <p>䓙西㐌𬎳𱾷𳂩𡗉質毒。欺𧡊𬄃䓙西㐌𬎳𱾷時𱚑𫽌𠬖，絶対空𢧚𫗒。</p>
    </main>
  </body>
</html>
